name: iluminacion-hernandez

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iluminacion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-iluminacion_hernandez}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
    name: iluminacion_hernandez_postgres_data
