name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Build Project
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Deploy via Rsync (Nativo)
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # 1. Configurar la llave
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Escanear el servidor para evitar la pregunta de "Confía en este host?"
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          
          # 3. Sincronizar (Solo subimos lo necesario)
          # Esto es mucho más estable que la acción anterior
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
            dist package.json pnpm-lock.yaml drizzle.config.ts drizzle \
            root@${{ secrets.EC2_HOST }}:/root/apps/backend/

      - name: Migrate and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /root/apps/backend
            pnpm install --prod --no-frozen-lockfile
            pnpm run db:migrate
            pm2 restart backend-api || PORT=3000 pm2 start dist/infrastructure/server.js --name "backend-api"
            pm2 save