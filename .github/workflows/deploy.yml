name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- PRUEBA DE CONEXIÓN AHORA COMO EC2-USER ---
      - name: Test SSH Connection
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          
          echo "Verificando acceso como ec2-user..."
          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=10 ec2-user@${{ secrets.EC2_HOST }} "echo '✅ CONEXIÓN EXITOSA' && whoami"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Build Project
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Native Deploy (SCP)
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Empacamos (Asegúrate de que 'drizzle' existe o quítalo de aquí)
          tar -czf deploy.tar.gz dist package.json pnpm-lock.yaml drizzle.config.ts drizzle
          
          # Subimos al home de ec2-user
          scp -i ~/.ssh/id_rsa deploy.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/apps/backend/
          
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ec2-user/apps/backend
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            pnpm install --prod --no-frozen-lockfile
            
            echo "--- Ejecutando Migraciones ---"
            pnpm run db:migrate
            
            echo "--- Reiniciando PM2 ---"
            # Como ec2-user, pm2 gestionará sus propios procesos
            pm2 restart backend-api || PORT=3000 pm2 start dist/infrastructure/server.js --name "backend-api"
            pm2 save
          EOF