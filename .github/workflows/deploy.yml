name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Eliminamos la línea "version" para que la lea del package.json

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Usamos 22 para estar al día
          cache: 'pnpm'

      - name: Build Project
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 10m # Aumentado para evitar error 142
          # Copiamos dist, configs y carpeta de migraciones (ajusta si se llama distinto)
          source: "dist,package.json,pnpm-lock.yaml,drizzle.config.ts,drizzle"
          target: "~/apps/backend"

      - name: Migrate and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/apps/backend
            pnpm install --prod --no-frozen-lockfile
            
            # Ejecutar migraciones de Drizzle
            echo "Ejecutando migraciones..."
            pnpm run db:migrate
            
            # Reiniciar con PM2 usando la ruta de tu "main"
            pm2 restart backend-api || PORT=3000 pm2 start dist/infrastructure/server.js --name "backend-api"
            pm2 save