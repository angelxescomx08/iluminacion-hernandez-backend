name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test SSH Connection
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=10 ec2-user@${{ secrets.EC2_HOST }} "echo '✅ CONEXIÓN OK' && node -v"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Usamos la misma que el servidor
          cache: 'pnpm'

      - name: Build Project
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Native Deploy (SCP)
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Empacamos dist, package, lock, config de drizzle y la carpeta de migraciones
          # Si tu carpeta de migraciones NO se llama 'drizzle', cambia el nombre aquí
          tar -czf deploy_backend.tar.gz dist package.json pnpm-lock.yaml drizzle.config.ts drizzle
          
          scp -i ~/.ssh/id_rsa deploy_backend.tar.gz ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/apps/backend/

      - name: Remote Commands
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            # 1. Definimos las rutas de ec2-user
            export PNPM_HOME="/home/ec2-user/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            
            cd /home/ec2-user/apps/backend
            
            # 2. Descomprimir
            tar -xzf deploy_backend.tar.gz
            rm deploy_backend.tar.gz
            
            # 3. Dependencias de producción
            pnpm install --prod --no-frozen-lockfile
            
            echo "--- Ejecutando Migraciones ---"
            pnpm run db:migrate
            
            echo "--- Reiniciando Aplicación ---"
            # Si ya existe, lo reinicia. Si no, lo arranca.
            pm2 restart backend-api || PORT=3000 pm2 start dist/infrastructure/server.js --name "backend-api"
            pm2 save
          EOF