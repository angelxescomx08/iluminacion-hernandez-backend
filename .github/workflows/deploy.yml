name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # El backend suele ser más flexible con Node
          cache: 'pnpm'

      - name: Build Project
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 5m # <--- TIEMPO EXTRA: Para evitar el error 142
          # IMPORTANTE: Incluye aquí la carpeta de tus migraciones (ej: 'drizzle' o 'migrations')
          source: "dist,package.json,pnpm-lock.yaml,drizzle.config.ts,drizzle" 
          target: "~/apps/backend"

      - name: Migrate and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m # Por si la migración tarda
          script: |
            cd ~/apps/backend
            pnpm install --prod --no-frozen-lockfile
            
            # EJECUTAR MIGRACIÓN DE DRIZZLE
            echo "Ejecutando pnpm run db:migrate..."
            pnpm run db:migrate
            
            # REINICIAR CON PM2
            # Ajustado a tu main: "dist/infrastructure/server.js" según tu package.json
            pm2 restart backend-api || PORT=3000 pm2 start dist/infrastructure/server.js --name "backend-api"
            pm2 save