name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          # Solo enviamos lo necesario para construir allá
          # NO enviamos 'dist' ni 'node_modules'
          source: "src,package.json,pnpm-lock.yaml,tsconfig.json,drizzle.config.ts,drizzle"
          target: "/root/apps/backend"

      - name: Build and Restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 15m # Damos tiempo para el build
          script: |
            cd /root/apps/backend
            
            # Instalar dependencias
            pnpm install --no-frozen-lockfile
            
            # Compilar el código en el servidor
            echo "Compilando proyecto..."
            pnpm run build
            
            # Ejecutar migraciones
            echo "Ejecutando migraciones..."
            pnpm run db:migrate
            
            # Reiniciar con PM2
            pm2 restart backend-api || PORT=3000 pm2 start dist/infrastructure/server.js --name "backend-api"
            pm2 save